# TDD Coding Harness — Default Configuration
# Priority: CLI arguments > this file > built-in defaults
version: 1

provider:
  name: openai          # mock | openai
  model: deepseek-v4-flash
  base_url: https://njusehub.info/v1
  temperature: 0.0
  max_tokens: 4096
  timeout: 30

loop:
  max_iterations: 15
  workspace: ./workspace

guardrail:
  enabled: true
  block_list: []

memory:
  enabled: true
  path: output/memory.json

credential:
  storage: keyring       # keyring | env | prompt
  env_var: OPENAI_API_KEY